kind = "web"
previewPath = "/"
title = "Mariela Martínez Inmobiliaria"
version = "1.0.0"
id = "artifacts/mariela-inmobiliaria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26253

[services.development]
run = "pnpm --filter @workspace/mariela-inmobiliaria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mariela-inmobiliaria", "run", "build" ]
publicDir = "artifacts/mariela-inmobiliaria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26253"
BASE_PATH = "/"
