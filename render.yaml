services:
  - type: web
    name: asset-manager-api
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/properties
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
